<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title></title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; }
    .box { width: 320px; height: 180px; background: #fff; position: relative; overflow: hidden; }
    .box iframe { position: absolute; top: -60px; left: -10px; width: 340px; height: 300px; border: none; pointer-events: none; }
  </style>
</head>
<body>
  <div class="box">
    <iframe id="player" src="https://www.youtube.com/embed/z6PsGr-L27M?autoplay=1&mute=0&controls=0&modestbranding=1&rel=0&disablekb=1&fs=0&iv_load_policy=3&start=165&enablejsapi=1" allow="autoplay" allowfullscreen></iframe>
  </div>
  <script>
    const START = 165;
    const END = 175;

    const tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);

    let player;

    window.onYouTubeIframeAPIReady = function() {
      player = new YT.Player('player', {
        events: {
          onReady: function(e) {
            e.target.seekTo(START, true);
            e.target.playVideo();
          },
          onStateChange: function(e) {
            if (e.data === YT.PlayerState.PAUSED) {
              e.target.playVideo();
            }
          }
        }
      });
    };

    setInterval(function() {
      if (!player || !player.getCurrentTime) return;
      const t = player.getCurrentTime();
      if (t >= END) {
        player.seekTo(START, true);
        player.playVideo();
      }
    }, 500);
  </script>
</body>
</html>
