<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fresh</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@700&family=Barlow+Condensed:wght@800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:#0d0f14;font-family:'Rajdhani',sans-serif;overflow-x:hidden;}

nav{
  position:fixed;top:0;left:0;width:100%;z-index:100;
  background:rgba(13,15,20,0.95);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 28px;height:48px;
}
.nav-logo{
  color:#fff;font-size:20px;font-weight:700;letter-spacing:2px;
  text-transform:uppercase;font-family:'Barlow Condensed',sans-serif;
}
.nav-links{display:flex;gap:6px;list-style:none;}
.nav-links li a{
  color:#b0b8c8;text-decoration:none;font-size:13px;font-weight:700;
  letter-spacing:1px;text-transform:uppercase;padding:6px 14px;
  border-radius:3px;transition:color 0.15s,background 0.15s;
}
.nav-links li a.active{background:#2a3a5c;color:#fff;}
.nav-links li a:hover{color:#fff;}

.hero-wrap{
  position:relative;
  margin-top:48px;
  width:100%;
  height:calc(100vh - 48px);
  max-height:520px;
  overflow:hidden;
}

.hero-bg{
  position:absolute;inset:0;
  background:url('banner.png') center 20%/cover no-repeat;
  z-index:0;
}

.hero-bg::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to right, rgba(0,0,0,0.62) 0%, rgba(0,0,0,0.18) 50%, rgba(0,0,0,0.05) 100%);
  z-index:1;
}

.diagonal-cut{
  position:absolute;bottom:0;left:0;width:100%;z-index:2;
  height:90px;
  background:#0d0f14;
  clip-path:polygon(0 60%, 100% 0%, 100% 100%, 0% 100%);
}

.hero-content{
  position:relative;z-index:3;
  padding:clamp(40px,7vw,90px) clamp(28px,5vw,80px);
  display:flex;flex-direction:column;align-items:flex-start;
  height:100%;justify-content:center;
}

.hero-sub{
  color:#e8e8e8;
  font-family:'Barlow Condensed',sans-serif;
  font-size:clamp(13px,1.3vw,17px);
  font-weight:800;
  letter-spacing:3px;
  text-transform:uppercase;
  text-shadow:0 1px 6px rgba(0,0,0,0.8);
  margin-bottom:2px;
}

.hero-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:clamp(60px,9vw,120px);
  font-weight:900;
  color:#fff;
  line-height:0.9;
  text-transform:uppercase;
  letter-spacing:-1px;
  text-shadow:3px 3px 0 rgba(0,0,0,0.4);
  margin-bottom:clamp(18px,2.5vw,32px);
}

.hero-btn{
  display:inline-block;
  background:#f5d800;
  color:#000;
  font-family:'Barlow Condensed',sans-serif;
  font-size:clamp(14px,1.4vw,18px);
  font-weight:900;
  letter-spacing:2px;
  text-transform:uppercase;
  padding:14px 36px;
  text-decoration:none;
  transition:background 0.15s,transform 0.1s;
}
.hero-btn:hover{background:#ffe500;transform:scale(1.03);}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">Fresh</div>
  <ul class="nav-links">
    <li><a href="#" class="active">Home</a></li>
    <li><a href="#">News</a></li>
    <li><a href="#">Donations</a></li>
    <li><a href="#">Tournaments</a></li>
  </ul>
</nav>

<div class="hero-wrap">
  <div class="hero-bg"></div>
  <div class="hero-content">
    <span class="hero-sub">Project Fresh</span>
    <div class="hero-title">SEASON 8</div>
    <a href="#" class="hero-btn">DOWNLOAD FOR WINDOWS</a>
  </div>
  <div class="diagonal-cut"></div>
</div>

</body>
</html>
