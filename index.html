<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title></title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; min-height: 100vh; background: #0d1117; display: flex; align-items: center; justify-content: center; padding: 24px; }

    .grid {
      display: grid;
      grid-template-columns: 2fr 1fr;
      grid-template-rows: repeat(3, auto);
      gap: 6px;
      width: 100%;
      max-width: 1400px;
    }

    .cell {
      position: relative;
      overflow: hidden;
      background: #000;
      aspect-ratio: 16/9;
    }

    .cell.tall {
      grid-row: span 2;
      aspect-ratio: unset;
    }

    .blocker {
      position: absolute;
      inset: 0;
      z-index: 10;
      cursor: default;
    }

    .cell iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      pointer-events: none;
      transform: scale(1.25);
      transform-origin: center center;
    }
  </style>
</head>
<body>
  <div class="grid">
    <div class="cell" id="c0"><div class="blocker"></div><div id="p0"></div></div>
    <div class="cell" id="c1"><div class="blocker"></div><div id="p1"></div></div>
    <div class="cell" id="c2"><div class="blocker"></div><div id="p2"></div></div>
    <div class="cell tall" id="c3"><div class="blocker"></div><div id="p3"></div></div>
    <div class="cell" id="c4"><div class="blocker"></div><div id="p4"></div></div>
    <div class="cell" id="c5"><div class="blocker"></div><div id="p5"></div></div>
  </div>

  <script>
    const VIDEOS = [
      { id: 'CAKanjchZjA', start: 535, end: 548 },
      { id: 'CAKanjchZjA', start: 535, end: 548 },
      { id: 'CAKanjchZjA', start: 535, end: 548 },
      { id: 'CAKanjchZjA', start: 535, end: 548 },
      { id: 'CAKanjchZjA', start: 535, end: 548 },
      { id: 'CAKanjchZjA', start: 535, end: 548 },
    ];

    const tag = document.createElement('script');
    tag.src = 'https://www.youtube.com/iframe_api';
    document.head.appendChild(tag);

    const players = [];

    window.onYouTubeIframeAPIReady = function() {
      VIDEOS.forEach(function(v, i) {
        const p = new YT.Player('p' + i, {
          videoId: v.id,
          playerVars: {
            autoplay: 1, mute: 1, controls: 0,
            modestbranding: 1, rel: 0, disablekb: 1,
            fs: 0, iv_load_policy: 3, start: v.start,
            playsinline: 1, vq: 'hd1080'
          },
          events: {
            onReady: function(e) {
              e.target.mute();
              e.target.setPlaybackQuality('hd1080');
              e.target.seekTo(v.start, true);
              e.target.playVideo();
              const iframe = e.target.getIframe();
              iframe.style.position = 'absolute';
              iframe.style.inset = '0';
              iframe.style.width = '100%';
              iframe.style.height = '100%';
              iframe.style.border = 'none';
              iframe.style.pointerEvents = 'none';
              iframe.style.transform = 'scale(1.25)';
              iframe.style.transformOrigin = 'center center';
            },
            onStateChange: function(e) {
              if (e.data === YT.PlayerState.PAUSED || e.data === YT.PlayerState.ENDED) {
                e.target.seekTo(v.start, true);
                e.target.playVideo();
              }
            }
          }
        });
        players.push({ player: p, start: v.start, end: v.end });
      });
    };

    setInterval(function() {
      players.forEach(function(obj) {
        if (!obj.player || !obj.player.getCurrentTime) return;
        if (obj.player.getCurrentTime() >= obj.end) {
          obj.player.seekTo(obj.start, true);
          obj.player.playVideo();
        }
      });
    }, 300);
  </script>
</body>
</html>
